services:
  frontend:
    build:
      context: ./frontend
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:4000/api
    ports:
      - '3000:3000'
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:4000/api
    depends_on:
      - backend

  backend:
    build: ./backend
    ports:
      - '4000:4000'
    restart: always
    environment:
      - MONGODB_URL=mongodb://mongo:27017
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - JWT_SECRET=super_secret_docker_key_123
      - ADMIN_EMAIL=admin@gmail.com
      - ADMIN_PASSWORD=admin123
      - PORT=4000
    depends_on:
      - mongo

  mongo:
    image: mongo:7
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data: